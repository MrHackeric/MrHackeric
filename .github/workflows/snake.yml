name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MrHackeric
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

**Step 3 — Run it manually the first time**

Go to your repo → **Actions** tab → click **Generate Snake** → click **Run workflow**. This generates the SVG and pushes it to a branch called `output`.

**Step 4 — Verify the file exists**

After the action completes, check that this URL works in your browser:
```
https://raw.githubusercontent.com/MrHackeric/MrHackeric/output/github-contribution-grid-snake-dark.svg
